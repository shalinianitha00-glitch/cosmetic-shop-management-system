<!DOCTYPE html>
<html>
<head>
    <title>Add Product - Admin</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1d2b64, #f8cdda);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 420px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 90px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: linear-gradient(45deg, #28a745, #218838);
            color: white;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .note {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #555;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>➕ Add New Product</h2>

    <form method="POST">

        <input type="text" name="name" placeholder="Product Name" required>

        <input type="number" step="0.01" name="price" placeholder="Price (₹)" required>

        <textarea name="description" placeholder="Product Description"></textarea>

        <input type="text" name="image" placeholder="Image filename (example: lipstick.jpg)">

        <label>Stock</label>
        <input type="number" name="stock" min="0" required>
        <button type="submit">Add Product</button>
    </form>

    <div class="note">
       
    </div>

    <a href="/admin_products">← Back to Manage Products</a>
</div>

</body>
</html>
