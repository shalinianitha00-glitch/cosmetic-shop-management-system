<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1d2b64, #f8cdda);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #555;
        }
    </style>
</head>
<body>

<div class="card">

    <h2>✏ Edit Product</h2>

    <form method="POST">

        <input type="text" name="name" value="{{ product.name }}" required>

        <input type="number" step="0.01" name="price" value="{{ product.price }}" required>

        <textarea name="description">{{ product.description }}</textarea>

        <input type="text" name="image" value="{{ product.image }}">

        <label>Stock</label>
        <input type="number" name="stock" min="0" value="{{ product.stock }}" required>
        <button type="submit">Update Product</button>
    </form>

    <a href="/admin_products" class="back">← Back to Manage Products</a>

</div>

</body>
</html>
