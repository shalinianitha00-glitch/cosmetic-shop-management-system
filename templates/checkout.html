<!DOCTYPE html>
<html>
<head>
    <title>Checkout - GlowCart</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .checkout-wrapper { display: flex; gap: 40px; max-width: 1100px; width: 100%; }

        .checkout-form, .order-summary {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .checkout-form { flex: 2; transition: 0.3s ease; }
        .checkout-form:hover { transform: translateY(-5px); }
        .order-summary { flex: 1; }

        h2 { margin-bottom: 25px; font-weight: 700; color: #2f3542; }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #444;
            margin-top: 15px;
            display: block;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: #ff6b81;
            box-shadow: 0 0 5px rgba(255,107,129,0.4);
            outline: none;
        }

        textarea { resize: none; height: 90px; }

        .place-order-btn {
            margin-top: 25px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #ff6b81, #ff4757);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .place-order-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255,71,87,0.4);
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .summary-total {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            font-weight: 600;
            font-size: 16px;
        }

        /* ✅ POPUP */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .popup-box {
            width: 420px;
            max-width: 90%;
            background: white;
            padding: 35px;
            border-radius: 18px;
            text-align: center;
            animation: pop 0.35s ease;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .popup-box h2 { color: #ff4757; margin-bottom: 8px; }
        .popup-box p { color: #444; font-weight: 500; }

        .popup-box button {
            margin-top: 18px;
            padding: 10px 22px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #ff6b81, #ff4757);
            color: white;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s ease;
        }

        .popup-box button:hover { transform: scale(1.05); }

        @keyframes pop {
            from { transform: scale(0.75); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

<body>

<div class="checkout-wrapper">

    <div class="checkout-form">
        <h2>Secure Checkout 💳</h2>

        <form method="POST" action="/place_order">

            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required>

            <label>Phone Number</label>
            <input type="text" name="phone" placeholder="Enter phone number" required>

            <label>Delivery Address</label>
            <textarea name="address" placeholder="Enter your delivery address" required></textarea>

            <label>Select Payment Method</label>
            <select name="payment_mode" required>
                <option value="">-- Choose Payment Method --</option>
                <option value="Cash on Delivery">Cash on Delivery</option>
                <option value="UPI">UPI</option>
                <option value="Debit Card">Debit Card</option>
                <option value="Credit Card">Credit Card</option>
            </select>

            <button type="submit" class="place-order-btn">Place Order 🚀</button>

        </form>
    </div>

    <div class="order-summary">
        <h2>Order Summary 🧾</h2>

        {% for item in cart_items %}
        <div class="summary-item">
            <span>{{ item.name }} (x{{ item.quantity }})</span>
            <span>₹{{ item.subtotal }}</span>
        </div>
        {% endfor %}

        <div class="summary-total">
            Total: ₹{{ total_amount }}
        </div>
    </div>

</div>

{% if success %}
<div class="popup-overlay" id="successPopup">
    <div class="popup-box">
        <h2>🎉 Order Placed Successfully!</h2>
        <p>Your beauty products are on the way 💄✨</p>
        <button onclick="goToDashboard()">OK</button>
    </div>
</div>
{% endif %}

<script>
function goToDashboard() {
    window.location.href = "/customer_dashboard?feedback=1";
}
</script>

</body>
</html>
